services:
  scraper:
    build: .
    container_name: appoynt-scraper
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - scraper-output:/app/output
      - scraper-logs:/app/logs

  file-server:
    image: python:3.12-slim
    working_dir: /app/output
    command: python -m http.server 8000
    volumes:
      - scraper-output:/app/output:ro
    restart: unless-stopped

volumes:
  scraper-output:
  scraper-logs:
